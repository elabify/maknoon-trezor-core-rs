# Verification gate for this hardware-wallet core crate: fmt + clippy + tests.
# Pure verification, no secrets. The crate root is a cargo workspace.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # --locked enforces the committed Cargo.lock (reproducible build).
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Unit + integration tests
        run: cargo test --locked --workspace --all-features
