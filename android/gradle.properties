# Performance + correctness flags for Gradle.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

# Use the AndroidX libraries by default.
android.useAndroidX=true

# Suppress the warning about the new R8 default since we explicitly
# rely on it for size-optimized release builds.
android.nonTransitiveRClass=true

# Kotlin compiler args.
kotlin.code.style=official
